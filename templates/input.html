<style>
.topoviz-wrapper {
    display: flex;
    flex-direction: column;
    height: 78vh;
}

/* Device input bar */
.device-input-bar {
    padding: 0 0 8px 0;
    display: flex;
    gap: 10px;
    align-items: center;
}

/* Toolbar */
.topoviz-toolbar {
    display: flex;
    gap: 10px;
    padding: 8px 0;
}

/* Main grid */
.topoviz-main {
    position: relative;
    flex: 1;
    border: 1px solid var(--border-color);
}

#topologyContainer {
    width: 100%;
    height: 100%;
}

/* Floating buttons */
.floating-controls {
    position: absolute;
    bottom: 15px;
    right: 15px;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.floating-controls  button {
    background-color: transparent;
    border: none;
    cursor: pointer;
    font-size: 16px;
}
</style>

<div class="topoviz-wrapper">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Device Input -->
    <div class="device-input-bar">
        <input type="text" name="devices" placeholder="router1.example.com, router2.example.com">
    </div>

    <!-- Toolbar -->
    <div class="topoviz-toolbar">
        <button type="button" onclick="openLoadModal()">Load</button>
        <button type="button" onclick="saveTopology()">Save</button>
        <button type="button" onclick="exportPNG()">Export PNG</button>
    </div>

    <!-- Main Panel -->
    <div class="topoviz-main">
        <div id="topologyContainer"></div>

        <div class="floating-controls">
            <button type="button" onclick="zoomIn()"><i class="fas fa-search-plus"></i></button>
            <button type="button" onclick="zoomOut()"><i class="fas fa-search-minus"></i></button>
            <button type="button" onclick="fitView()"><i class="fas fa-expand"></i></button>
        </div>
    </div>
</div>
<div id="topologyData" style="display:none;"></div>
<div id="loadModal" class="modal-overlay">
    <div class="modal" style="width: 500px;">
        <div class="modal-header">
            <div class="modal-title">Saved Topologies</div>
            <button type="button" onclick="closeLoadModal()">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <div class="modal-body">
           <select id="fileList" style="width:100%; border:1px solid #ccc; padding:8px;">
               <option>Loading...</option>
           </select>
        </div>
         <div class="modal-footer">
                <button type="button" onclick="loadFile(document.getElementById('fileList').value)">Load</button>
        </div>
    </div>
</div>

<script src="https://unpkg.com/cytoscape@3.26.0/dist/cytoscape.min.js"></script>

<script>
/* ================= RENDER ================= */

window.renderTopology = function(data) {

    if (window.cy) window.cy.destroy();
    window.currentTopology = data;

    window.cy = cytoscape({
        container: document.getElementById('topologyContainer'),
        elements: [...data.nodes, ...data.edges],

        style: [

            /* DEFAULT NETWORK DEVICE */
            {
                selector: 'node',
                style: {
                    'background-image': 'https://img.icons8.com/fluency/96/router.png',
                    'background-fit': 'contain',
                    'background-opacity': 0,
                    'width': 80,
                    'height': 80,
                    'label': function(ele){
                        const h = ele.data('id');
                        const m = ele.data('model') || '';
                        return h + (m ? '\n' + m : '');
                    },
                    'padding-top': 30,
                    'text-valign': 'bottom',
                    'text-halign': 'center',
                    'text-wrap': 'wrap',
                    'text-margin-y': 6,
                    'text-background-color': '#fff',
                    'text-background-opacity': 1,
                    'font-size': 24,
                    'font-weight': '400',
                    'font-family': 'GoogleSansCode, sans-serif',
                }
            },
           {
                selector: 'node[type="network"]',
                style: {
                    'background-image': 'https://img.icons8.com/fluency/96/router.png',
                    'background-fit': 'contain',
                    'background-opacity': 0,
                    'width': 60,
                    'height': 60
                }
            },
            /* ACCESS SWITCH */
            {
                selector: 'node[type="access"]',
                style: {
                    'background-image': 'https://img.icons8.com/fluency/96/switch.png',
                    'background-fit': 'contain',
                    'background-opacity': 0,
                    'width': 60,
                    'height': 60
                }
            },

            /* ENDPOINT */
            {
                selector: 'node[type="endpoint"]',
                style: {
                    'background-image': 'https://img.icons8.com/fluency/96/imac.png',
                    'background-fit': 'contain',
                    'background-opacity': 0,
                    'width': 50,
                    'height': 50
                }
            },

            /* EDGE */
            {
                selector: 'edge',
                style: {
                    'curve-style': 'bezier',
                    'width': 2,
                    'line-color': '#036897',
                    'source-label': 'data(from_port)',
                    'source-text-offset':70,
                    'source-text-rotation': 'autorotate',
                    'target-label': 'data(to_port)',
                    'target-text-offset': 70,
                    'target-text-rotation': 'autorotate',
                    'font-size': 20,
                    'font-weight': '400',
                    'font-family': 'GoogleSansCode, sans-serif',
                    'text-background-color': '#fff',
                    'text-background-opacity': 1,
                    'text-background-padding': 6,
                    'text-border-color': '#036897',
                    'text-border-width': 3,
                    'text-border-opacity': 1,
                }
            }
        ],

        layout: { name: 'preset' }
    });
    cy.fit(null, 40);
};

/* ================= MUTATION OBSERVER ================= */

(function(){
    const div = document.getElementById("topologyData");
    if (!div) return;
    new MutationObserver(() => {
        const json = div.textContent.trim();
        if (!json) return;
        renderTopology(JSON.parse(json));
    }).observe(div, {childList:true});
})();

/* ================= CONTROLS ================= */

function zoomIn(){ if(window.cy) cy.zoom(cy.zoom()*1.2); }
function zoomOut(){ if(window.cy) cy.zoom(cy.zoom()*0.8); }
function fitView(){ if(window.cy) cy.fit(null, 40); }

/* ================= SAVE ================= */

async function saveTopology(){

    if (!window.currentTopology) return;

    try {
        await window.callScriptRoute("save_json", window.currentTopology, "POST");
    } catch (err) {
        console.error("Save failed:", err);
    }
}

/* ================= LOAD MODAL ================= */

async function openLoadModal(){
    try {
        const files = await callScriptRoute("list_json");

        const container = document.getElementById("fileList");
        container.innerHTML = "";
        files.forEach(file => {
            const option = document.createElement("option");
            option.value = file;
            option.textContent = file;
            container.appendChild(option);
        });

        document.getElementById("loadModal").style.display = "flex";

    } catch (err) {
        console.error("Failed to load file list:", err);
    }
}

async function loadFile(name){

    try {
        const data = await window.callScriptRoute("load_json",
            { filename: name },
            "POST"
        );

        renderTopology(data);
        closeLoadModal();

    } catch (err) {
        console.error("Load failed:", err);
    }
}

function closeLoadModal(){
    document.getElementById("loadModal").style.display = "none";
}

/* ================= EXPORT ================= */

async function exportPNG(){

    if (!window.cy) return;

    const png = cy.png({ full: true });

    try {
        await window.callScriptRoute("save_png",
        { image: png },
        "POST"
        );
    } catch (err) {
        console.error("PNG save failed:", err);
    }
}
</script>
